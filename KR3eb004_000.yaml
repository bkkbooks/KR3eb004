body:
  text: 四診心法要訣上醫家造精微通幽顯未有不先望而得之者近世惟事切巧不事望神大失古聖先賢之旨今採醫經論色診之文確然可法者編為四言合崔嘉彥四言脈訣名曰四診要訣實該望聞問切之道使後之為醫師者由是而教為弟子者由是而學熟讀習玩揣摩日久自能洞悉其妙則造精微通幽顯也無難矣望以目察聞以耳占問以言審切以指參明斯診道識病根源能合色脈可以萬全注此明望聞問切為識病之要道也經曰望而知之謂之神是以目察五色也聞而知之謂之聖是以耳識五音也問而知之謂之工是以言審五病也切而知之謂之巧是以指別五脈也神聖工巧四者乃診病要道醫者明斯更能互相參合則可識萬病根源以之療治自萬舉而萬當矣五行五色青赤黃白黑復生青如環常德注此明天以五行人以五臟化生五色相生如環之常德也木主化生青色火主化生赤色土主化生黃色金主化生白色水主化生黑色肝主化生青色心主化生赤色脾主化生黃色肺主化生白色腎主化生黑色變色大要生克順逆青赤兼化赤黃合一黃白淡黃黑青深碧白黑淡黑白青淺碧赤白化紅青黃變緑黑赤紫成黑黃黧立注此明五色生克順逆相兼合化之變色也五色相兼合化不可勝數而其大要則相生之順色有五相剋之逆色亦有五青屬木化赤屬火化黃屬土化白屬金化黑屬水化此五行所化之常色也木火同化火土同化土金同化金水同化水木同化金木兼化木土兼化土水兼化水火兼化火金兼化此五行所化之變色也如青赤合化紅而兼青之色如赤黃合化紅而兼黃之色如黃白合化黃而兼白淡黃之色如白黑合化黑而兼白淡黑之色如黑青合化黑而兼青深碧之色皆相生變色為病之順也如白青兼化青而兼白淺碧之色如赤白兼化白而兼赤之紅色如青黃兼化青而兼黃之緑色如黑赤兼化黑而兼赤之紫色如黃黑兼化黃而兼黑之黧色皆相剋變色為病之逆也醫能識此則可推五臟主病兼病吉凶變化之情矣天有五氣食人入鼻藏於五臟上華面頤肝青心赤脾臟色黃肺白腎黑五臟之常注此明色之本原出於天徵乎人五臟不病常色之診法也天以風暑濕燥寒之五氣食人從鼻而入風氣入肝暑氣入心濕氣入脾燥氣入肺寒氣入腎藏於人之五臟蘊其精氣上華於面肝之精華化為色青心之精華化為色赤脾之精華化為色黃肺之精華化為色白腎之精華化為色黑也臟色為主時色為客春青夏赤秋白冬黑長夏四季色黃常則客勝主善主勝客惡注此明四時不病常色之診法也五臟之色隨五形之人而見百歲不變故為主色也四時之色隨四時加臨推遷不常故為客色也春氣通肝其色當青夏氣通心其色當赤秋氣通肺其色當白冬氣通腎其色當黑長夏四季之氣通脾其色當黃此為四時常則之色也主色者人之臟氣之所生也客色者歲氣加臨之所化也夫歲氣勝人氣為順故曰客勝主為善人氣勝歲氣為逆故曰主勝客為惡凡所謂勝者當青反白當赤反黑當白反赤當黑反黃當黃反青之謂也色脈相合青弦赤洪黃緩白浮黑沉乃平已見其色不得其脈得克則死得生則生注此明色脈相合相反生死之診法也凡病人面青脈弦面赤脈洪面黃脈緩面白脈浮面黑脈沉此為色脈相合不病平人之候也假如病人已見青色不得弦脈此為色脈相反主為病之色脈也若得浮脈是得克色之脈則主死也得沉脈是得生色之脈則主生也其餘他色皆仿此新病脈奪其色不奪久病色奪其脈不奪新病易已色脈不奪久病難治色脈俱奪注此以色脈相合診病新久難易之法也脈奪者脈微小也色奪者色不澤也新病正受邪制故脈奪也邪受未久故色不奪也久病受邪已久故色奪也久病不進故脈不奪也若新病而色脈俱不奪則正不衰而邪不盛也故曰易已久病色脈俱奪則正已衰而邪方盛也故曰難治色見皮外氣含皮中內光外澤氣色相融有色無氣不病命傾有氣無色雖困不凶注此以五色合五氣之診法也青黃赤白黑顯然彰於皮之外者五色也隱然含於皮之中者五氣也內光灼灼若動從紋路中映出外澤如玉不浮光油亮者則為氣色並至相生無病之容狀也若外見五色內無含映則為有色無氣經曰色至氣不至者死凡四時五臟五部五官百病見之皆死故雖不病命必傾也若外色淺淡不澤而內含光氣映出則為有氣無色經曰氣至色不至者生凡四時五臟五部五官百病見之皆生故雖病困而不凶也縞裹雄黃脾狀並臻縞裹紅肺縞裹朱心縞裹黑赤紫豔腎緣縞裹藍赤石青屬肝注此明氣色並至容狀之診法也縞白羅也如白羅裹雄黃映出黃中透紅之色是脾之氣色並至之容狀也如白羅裹淺紅映出淺紅罩白之色是肺之氣色並至之容狀也如白羅裹硃砂映出深紅正赤之色是心之氣色並至之容狀也如白羅裹黑赤映出黑中透赤紫豔之色是腎之氣色並至之容狀也如白羅裹藍赤映出藍中揚紅石青之色是肝之氣色並至之容狀也青如蒼壁不欲如藍赤白裹朱衃赭死原黑重炱漆白羽枯鹽雄黃羅裹黃土終難注此明四時百病五臟五部五官五色生死之診法也蒼壁碧玉也藍藍靛葉也經曰青欲如蒼壁之色即石青色生青色也不欲如藍即靛葉色死青色也衃血死血也赭代赭石也經曰赤欲如白裹朱即正赤色生紅色也不欲如衃赭即死血赭石之色死紅色也重漆光潤紫色也炱地上蒼枯黑土也經曰黑欲如重漆即光潤紫色生黑色也不欲如負即枯黑土色死黑色也白羽白鵝羽也枯枯骨也鹽食鹽也經曰白欲如鵝羽即白而光澤如鵝羽之色生白色也不欲如枯鹽即枯骨食鹽之色死白色也經曰黃欲如羅裹雄黃即黃中透紅之色生黃色也不欲如黃土即枯黃土之色死黃色也舌赤卷短心官病常肺鼻白喘胸滿喘張肝目眥青脾病唇黃耳黑腎病深淺分彰注此以五色合五官主病虛實之診法也舌者心之官也舌赤心之病也色深赤焦卷者邪實也色淺紅滋短者正虛也鼻者肺之官也鼻白肺之病也色淺白喘而不滿者正虛也色深白喘而胸滿者邪實也目者肝之官也目眥青肝之病也色深青者邪實也色淺青者正虛也口唇者脾之官也唇黃脾之病也色深黃者邪實也色淺黃者正虛也耳者腎之官也耳黑腎之病也色深黑者邪實也色淺黑者正虛也所謂深淺分彰者即下之所謂淺淡為虛深濃為實分明彰顯也左頰部肝右頰部肺額心頦腎鼻脾部位部見本色深淺病纍若見他色按法推類注此以五色合五部主虛實賊微正五邪之診法也左頰肝之部也右頰肺之部也額上心之部也頦下腎之部也鼻者脾之部也本部見本色淺淡不及深濃太過者皆病色也假如鼻者脾之部位見黃本色則為本經自病正邪也若見白色則為子盜母氣虛邪也若見赤色則為母助子氣實邪也若見青色則為彼能克我賊邪也若見黑色則為我能克彼微邪也所謂按法推類者謂餘臟准按此法而推其類也天庭面首闕上喉咽闕中印堂候肺之原山根候心年壽候肝兩傍候膽脾胃鼻端頰腎腰臍顴下大腸顴內小腑面王子膀當顴候肩顴外候臂顴外之下乃候手位根傍乳膺繩上候背牙車下股膝脛足位注此以上部候頭下部候足中部候臟腑合五色主病之診法也闕中者兩眉之間謂之印堂中部之最高者故應候肺之疾也印堂之上名曰闕上闕上至髮際名曰天庭天庭為上部之上故應候頭面之疾也闕上為上部之下故應候咽喉之疾也山根者兩目之間即下極也在肺下之部故應候心之疾也年壽者下極之下即鼻柱也在心下之部故應候肝之疾也面傍者年壽之左右膽附於肝故應候膽之疾也鼻端者年壽之下謂之面王即準頭鼻孔也在肝下之部故應候脾之疾也鼻孔者即方上也脾胃相連故應候胃之疾也耳前之下謂之兩頰四臟居腹而皆一惟腎居脊而有兩故兩頰應候腎之疾也與腰臍對故又應候腰臍之疾也頰內高骨謂之兩顴之下在腎下之部故應候大腸之疾也顴內者即兩顴之內也小腑者謂小腸之腑也小腸在大腸之上故應候之也準頭上至於庭皆謂之明堂準頭下至於頦皆謂之面王面王者即人中承漿之部也膀胱者腎之腑也子處者即精室血海也皆居腎之下故面王應候子處膀胱之疾也此臟腑上下內外之部位也五部以頦候腎者以水居極下且子處中通兩腎也以天庭候心者以火居極上故也以左頰候肝者以木位居左故也以右頰候肺者以金位居右故也以鼻候脾者以土位居中故也當顴者當兩顴骨之部也顴為骨之本而居外部之上故應候肩之疾也肩接乎臂故顴骨之外應候臂之疾也臂接乎手故顴外之下應候手部之疾也根傍者山根兩傍兩目內眥之部也而居內部之上故應候膺乳胸前之疾也兩頰候腰腎頰外從頰骨上引曰繩骨故應候背之疾也頰外從頰骨下引曰牙車骨故應候股下膝脛足部之疾也此肢體上下內外之部位也庭闕鼻端高起直平顴頰蕃蔽大廣豐隆骨胳明顯壽亨遐齡骨胳陷弱易受邪攻注此明五官五部強弱壽夭之診法也天庭闕中至鼻之端皆高起直平面顴兩頰蕃蔽耳門皆大廣豐隆去之十步皆見於外則為骨胳明顯也其人不但不病且享遇齡之壽也若天庭顴頰耳門諸處骨卑肉薄則為骨胳陷弱也其人不但不免於病且不壽也黃赤風熱青白主寒青黑為痛甚則痹攣恍白脫血微黑水寒痿黃諸虛顴赤勞纏注此以五色隨其所在五官五部內部外部上部下部主病之診法也黃赤為陽色故為病亦陽所以主風也熱也青白黑為陰色故為病亦陰所以主寒也痛也若黑甚在脈則麻痹在筋則拘攣恍白者淺淡白色也主大吐衄下血脫血也若無衄吐下血則為心不生血不榮於色也微黑者淺淡黑色也主腎病水寒也痿黃者淺淡黃色也主諸虛病也兩顴深紅赤色者主陰火上乘虛損勞疾也視色之鋭所向部官內走外易外走內難官部色脈五病交參上逆下順左右反阽注此以五色傳乘官部之診法也色之尖處為鋭凡病相傳相乘當視其色之鋭處所向何官何部則知起自何官何部傳乘何部何官生克順逆自然明矣鋭處向外是內部走外部則為臟傳腑腑傳表易治之病也鋭處向內是外部走內部則為表傳腑腑傳臟難治之病也內走處走固有難易然更當以五部五官五色五脈五病交相推參則又有微甚生死之別焉凡病色從下衝明堂而上額則為水剋火之賊邪故逆也從上壓明堂而下頦則為火侮水之微邪故順也反相反也阽危也男子以左為主女子以右為主男子之色自左衝右為從自右沖左為逆女子之色自右沖左為從自左衝右為逆逆者相反也相反故危也前以內外部位分順逆後以上下左右分順逆不可不知沉濁晦暗內久而重浮澤明顯外新而輕其病不甚半澤半明雲散易治摶聚難攻注此以五色晦明聚散別久重新輕之病易治難治之診法也色深為沉主病在內若更濁滯晦暗主久病與重病也色淺為浮主病在外若得光澤明顯主新病與輕病也若其色雖不枯晦亦不明澤主不甚之病也凡諸病之色如雲撤散主病將愈易治也摶聚凝滯主病漸進難治也上以內外上下左右分順逆此以淺深晦明聚散分順逆也黑庭赤顴出如拇指病雖小愈亦必卒死唇面黑青五官黑起擦殘汗粉白色皆死注此明非常之色診人暴死之法也出如拇指謂成塊成條摶聚不散也黑色出如拇指於天庭赤色出如拇指於兩顴此皆水火相射之候故病者雖或小愈亦必卒然而死也病者唇面青黑及五官忽起黑色白色如擦殘汗粉之狀雖不病亦皆主卒死也善色不病於義誠當惡色不病必主凶殃五官陷弱庭闕不張蕃蔽卑小不病神強注此明見其色不見其病之診法也善色者氣色並至之好色也其人於理當不病也惡色者沉深滯晦之色也其人即不病亦必主凶殃也凶殃者即相家所謂紅主焦勞口舌白主刑罰孝服黑主非災凶死青主憂訟暴亡之類也五官陷弱者謂五官骨陷肉薄也庭闕不張者謂天庭闕中不豐隆張顯也蕃蔽卑小者謂頰側耳門卑低不廣也此皆無病而有不壽之形若加惡色豈能堪哉其有不病者必其人神氣強旺素稱其形也肝病善怒面色當青左有動氣轉筋脅疼諸風掉眩疝病耳聾目視䀮䀮如將捕驚注此下五條皆明色病相合本臟自病虛實之診法也怒者肝之志故病則好怒也青者肝之色故病則面色當青也肝之部位在左故病則左脅有動氣而脅疼也肝主筋故病則轉筋也掉者動搖抽搐也眩者昏黑不明也肝主風故病則掉眩也疝主肝故病疝也肝與膽為表裡故病耳聾也此皆肝實之病若肝虛則目視䀮䀮無所見以肝開竅於目也肝虛則膽薄故不時而有如人將捕之驚也心赤善喜舌紅口乾臍上動氣心胸痛煩健忘驚悸怔忡不安實狂昏冒虛悲悽然注喜者心之志故病則好喜也赤者心之色故病則面色赤也心開竅於舌故病則舌赤紅也心主熱故病則口乾心煩也心之部位在上故病則臍上有動氣也胸者心肺之宮城也故病則心胸痛也健忘驚悸怔忡皆心神不安之病也熱乘心實則發狂昏冒也神怯心虛則悽然好悲也脾黃善憂當臍動氣善思食少倦怠乏力腹滿腸鳴痛而下利實則身重脹滿便閉注黃者脾之色故病則面色黃也憂思者脾之志故病則好憂思也脾之部位在中故病則當臍有動氣也脾主味故病則食少也脾主四肢故病則倦怠乏力也脾主腹故病則腹滿腸鳴痛而下利也此皆脾虛之病也脾主肉故實則病身重腹脹滿便閉也肺白善悲臍右動氣灑淅寒熱咳唾噴嚏喘呼氣促膚痛胸痹虛則氣短不能續息注白者肺之色故病則面色白也悲者肺之志故病則好悲也肺之部位在右故病則右脅有動氣也肺主皮毛故病則灑淅寒熱膚痛也咳嗽唾痰噴嚏流涕喘呼氣促皆肺本病也胸者肺之府也故病則胸痹而痛也肺虛則胸中氣少故喘咳皆氣短不能續息也腎黑善恐臍下動氣腹脹腫喘溲便不利腰背少腹骨痛缺氣心懸如飢足寒厥逆注黑者腎之色故病則面色黑也恐者腎之志故病則好恐也腎之部位在下故病則臍下有動氣也腎主水故病則水蓄腹脹腫滿喘不得臥也腎開竅於二陰故病則溲便不利也腎主骨腎與膀胱為表裡故病則少腹滿背與骨俱痛也腎主缺故病則呵缺也腎邪上乘於心故病則心空如飢也諸厥屬下故病則足寒厥逆也正病正色為病多順病色交錯為病多逆母乘子順子乘母逆相剋逆凶相生順吉注此以五色合五病順逆生死之診法也假如肝病色青是正病正色若反見他色是病色交錯也若見黑色為母乘子相生之順也若見赤色為子乘母相生之逆也若見黃色為病克色其病不加凶中順也若見白色為色克病其病則甚凶中逆也曰相剋逆凶者謂相剋為凶凶中順尚可也凶中逆必凶也曰相生順吉者謂相生為吉如子乘母為吉中小逆也如母乘子為吉中大順也其餘四臟皆仿也色生於臟各命其部神藏於心外候在目光晦神短了了神足單失久病雙失即故注此以色合二目之神診病生死之法也五色生於五臟各命其部而見於面神藏於心雖不可得而識然外候在目視其目光晦暗此為神短病死之候也若目睛清瑩了了分明此為神足不病之候也單失者謂或色或神主久病也雙失者神色俱失故主即死也面目之色各有相當交互錯見皆主身亡面黃有救眥紅疹瘍眥黃病愈睛黃髮黃注此以色合二目之色診病之法也面目之色各有相當之色如面之色肝青心赤脾黃肺白腎黑目之色如睛瞳黑烏珠青白珠白兩眥紅也若目青目赤目白目黑與面色但有不同皆為交互錯見病者皆主身亡也惟面色黃者為土未敗五行有救皆不死也若傷寒兩目眥紅則為發疹瘍之兆兩目皆黃則為病將愈之徵若兩睛通黃則為主發黃疸之候也閉目陰病開目病陽朦朧熱盛時瞑衄常陽絶戴眼陰脫目盲氣脫眶陷睛定神亡注此診目陰陽生死之法也凡病者閉目則為病在陰也開目則為病在陽也朦朧昏不了了非開目也則為熱盛傷神也視而時瞑非開目也則為衄血之常候也目上直視謂之戴眼則為陽絶之候也視不見物謂之目盲則為陰脫之候也目眶忽陷則為氣脫之候也睛定不轉則為神亡之候也五色既審五音當明聲為音本音以聲生聲之餘韻音遂以名角徵宮商並羽五聲注此明五音乃天地之正氣人之中聲也有聲而後有音故聲為音本音以聲生也聲之餘韻則謂之音非聲之外復有音也五色命乎五臟診人之病既已審矣而五音通乎五臟診人之病亦當明也角屬木通乎肝微屬火通乎心宮屬土通乎脾商屬金通乎肺羽屬水通乎腎也中空有竅故肺主聲喉為聲路會厭門戶舌為聲機唇齒扇助寬隘鋭鈍厚薄之故注此明聲音各有所主之診法也凡萬物中空有竅者皆能鳴焉故肺象之而主聲也凡發聲必由喉出故為聲音之路也必因會厭開闔故為聲音門戶也必借舌為宛轉故為聲音之機也必資之於牙齒唇口故為聲音之扇助也五者相須故能出五音而宣達遠近也若夫喉有寬隘寬者聲大隘者聲小舌有鋭鈍鋭者聲辨鈍者不真會厭有厚薄厚者聲濁薄者聲清唇亦有厚薄厚者聲遲薄者聲疾牙齒有疏密疏者聲散密者聲聚五者皆無病之聲音乃形質之稟賦不同也以此推之在喉在會厭在舌在齒在唇之故當有別也舌居中發喉音正宮極長下濁沉厚雄洪開口張齶口音商成次長下濁鏗鏘肅清撮口唇音極短高清柔細透徹尖利羽聲舌點齒音次短高清抑揚詠越徵聲始通角縮舌音條暢正中長短高下清濁和平注此明五臟聲音不病之常之診法也經曰天食人以五氣五氣入鼻藏於心肺上使五色修明聲音能彰故五臟各有正聲以合於五音也如舌居中發音自喉出者此宮之正音也其聲極長極下極濁有沉洪雄厚之韻屬土入通於脾開口張齶音自口出者此商之正音也其聲次長次下次濁有鏗鏘清肅之韻屬金入通於肺撮口而發音自唇出者此羽之正音也其聲極短極高極清有柔細尖利之韻屬水入通於腎以舌點齒成音者乃徵之正音也其聲次短次高次清有抑揚詠越之韻屬火入通於心內縮其舌而成音者乃角之正音也其聲長短高下清濁相和有條暢中正之韻屬木入通於肝此五臟不病之常聲也齶者齒本肉也喜心所感欣散之聲怒心所感忿厲之聲哀心所感悲嘶之聲樂心所感舒緩之聲敬心所感正肅之聲愛心所感溫和之聲注前以咽喉會厭舌齒口唇稟賦不同以別非病之音此又復以人之情感物成聲以明非病之聲也如為喜感於心者則其發聲必欣悅以散也怒感於心者則其發聲必忿急而厲也哀感於心者則其發聲必悲悽以嘶也樂感於心者則其發聲必舒暢不迫也敬感於心者則其發聲必正直肅斂也愛感於心者則其發聲必溫柔以和也醫者於此比類而推不病之音自可識有病之音也五聲之變變則病生肝呼而急心笑而雄脾歌以漫肺哭促聲腎呻低微色克則凶注此以五聲變而生病之診法也五聲失正則謂之變變則病生也肝呼而聲急肝聲失正故知病生肝也心笑而聲雄心聲失正故知病生心也脾歌而聲漫脾聲失正故知病生脾也肺哭而聲促肺聲失正故知病生肺也腎呻而低微腎聲失正故知病生腎也所謂色克則凶者假如肝病呼急得相剋之白色主凶也餘臟仿此好言者熱懶言者寒言壯為實言輕為虛言微難復奪氣可知譫妄無倫神明已失注此以聲音診病寒熱虛實生死之法也中藏經曰陽候多語熱也陰候無聲寒也發言壯厲實也發言輕微虛也若言聲微小不能出喉欲言不能復言者此奪氣也譫言妄語不別親疏神明失也皆主死候失音聲重內火外寒瘡痛而久勞啞使然啞風不語雖治命難嘔歌失音不治亦痊注此明失音為病不同之診也失音聲粗重乃內火為外寒所遏鬱於肺也若不粗重且瘡爛而痛日久流連者是因勞啞使然也小兒抽風不語大人中風不語皆謂之啞風雖竭力治之而命則終難挽回以金不能制木也謳歌失音者是因歌傷喉不治亦可痊也聲色既詳問亦當知視其五人以知起止心主五臭自入為焦脾香腎腐肺腥肝臊脾主五味自入為甘肝酸心苦肺辛腎咸腎主五液心汗肝泣自入為唾脾涎肺涕注此明五入問病之診法也肺主五聲肝主五色前已詳明而問之之道亦所當知也經曰治之極於一一者問其因而得其情也其要在視其五入即可以知病情之起止也假如心主五臭凡病者喜臭惡臭皆主於心此統而言之也若分而言之則自入喜焦病生心也入脾喜香病生脾也入腎喜腐病生腎也入肺喜腥病生肺也入肝喜臊病生肝也脾主五味凡病者喜味惡味皆主於脾此統而言之也若分而言之則自入喜甘病生脾也入肝喜酸病生肝也入心喜苦病生心也入肺喜辛病生肺也入腎喜咸病生腎也腎主五液凡病者多液少液皆主於腎此統而言之也若分而言之則自入出而為唾病生腎也入心出而為汗病生心也入肝出而為淚病生肝也入脾出而為涎病生脾也入肺出而為涕病生肺也其聲之微壯色之順逆法同推也百病之常晝安朝慧夕加夜甚正邪進退潮作之時精神為貴不衰者實困弱虛纍注此以問知精神盛衰虛實之診法也凡病朝慧者以朝則人氣始生衛氣始行故慧也晝安者以日中則人氣長長則勝邪故安也夕加者以夕則人氣始衰邪氣始生故加也夜甚者以夜半則人氣入臟邪氣獨居於身故甚也此百病消長邪正進退之常也凡病來潮發作之時精神為貴者以病至精神不衰則為邪氣不能勝正正氣實也病至精神困弱則為正氣不能勝邪正氣虛也晝劇而熱陽旺於陽夜劇而寒陰旺於陰晝劇而寒陰上乘陽夜劇而熱陽下陷陰晝夜寒厥重陰無陽晝夜煩熱重陽無陰晝寒夜熱陰陽交錯飲食不入死終難卻注此以問知晝夜起居診病陰陽氣血生死之法也晝陽也熱陽也凡病晝則增劇煩熱而夜安靜者是陽自旺於陽分氣病而血不病也夜陰也寒陰也凡病夜則增劇寒厥而晝安靜者是陰自旺於陰分血病而氣不病也凡病晝則增劇寒厥而夜安靜者是陰上乘於陽分之病也凡病夜則增劇煩熱而晝安靜者是陽下陷於陰分之病也凡病晝夜俱寒厥者是重陰無陽之病也凡病晝夜俱煩熱者是重陽無陰之病也凡病晝則寒厥夜則煩熱者名曰陰陽交錯若飲食不入其人之死終難卻也食多氣少火化新痊食少氣多胃肺兩愆喜冷有熱喜熱有寒寒熱虛實多少之間注此以問知飲食之診法也食多氣盛此其常也若食多氣少非胃病火化即新愈之後貪食而穀氣未足也食少氣少此其常也若食少氣多則必是胃病不食肺病氣逆兩經之愆也喜冷者中必有熱喜熱者中必有寒虛熱則飲冷少實熱則飲冷多虛寒則飲熱少實寒則飲熱多故曰寒熱虛實辨在多少之間也大便通閉關乎虛實無熱陰結無寒陽利小便紅白主乎熱寒陰虛紅淺濕熱白泔注此以問知大小二便之診法也大便之利不利關乎里之虛實也閉者為實若內外並無熱證則為陰結便閉也通者為虛若內外並無寒證則為陽實熱利也小便之紅與白主乎里之寒熱也紅者為熱若平素淺紅淡黃則為陰虛也白者為寒若平素白渾如米泔則為濕熱所化也望以觀色問以測情召醫至榻不盼不驚或告之痛並無苦容色脈皆和詐病欺矇注此以色合問診病真僞之法也望色只可以知病之處非問不足以測病之情也凡病者聞醫至榻未有不盼視而驚起者也若不驚起而盼視者非無病必驕恣之輩也若病者或告之痛醫視其面並無痛苦容狀診其色脈皆利此乃詐病欺矇醫士也脈之呻吟病者常情搖頭而言護處必疼三言三止言謇為風咽唾呵缺皆非病徵注此以聲合情診病真僞之法也醫家診脈病者呻吟以其為病所苦無奈之常情也凡欲言而先搖頭者是痛極艱於發聲搖頭以意示緩故也若以手護腹則為里痛護頭則為頭痛但有所護之處必有所痛也持脈之時病人三言三止者謂欲言不言不言欲言如此者三也言謇不能言者風病也若非言謇風病而三言三止者是故為詐病之態也或脈之而咽唾或脈之而呵缺皆非有病之徵以咽唾者裡氣和呵缺者陰陽和故也舉此二事以診別其情之真僞則其他可推廣矣蓋意在使病者不能售其欺醫者不致為其所欺而妄治也黑色無痛女疸腎傷非疸血蓄衄下後黃面微黃黑紋繞口角飢瘦之容詢必噎膈注此以色合問診病之法也黑色當主痛詢之無痛病或為腎傷女勞疸也察之又非女疸其為血蓄於中顏變於外可知然血蓄之黑則必或吐衄或下血而後即轉黃色以瘀去故也面微黑黃者即淺淡之黧色也視其壽帶紋短若纏繞口角亦非蓄血即相家所謂螣蛇入口主人餓死更視其人有飢餓削瘦之容可知病不能食詢問必是噎膈也白不脫血脈如亂絲問因恐怖氣下神失乍白乍赤脈浮氣怯羞愧神蕩有此氣色注此以色合情之診法也白者脫血虛色也察之並無脫血之證問之始知因恐怖也恐則血隨氣下故色白也怖則神隨氣失故脈如亂絲也乍白乍赤氣血不定之色也脈浮氣怯神氣不安之象也問之始知中心羞愧有此氣色也羞則氣收故氣怯也愧則神蕩故脈浮也舉此情色二端一以診病一以診情他可類推總在臨病者神而明之也眉起五色其病在皮營變蠕動血脈可知眥目筋病唇口主肌耳主骨病焦枯垢泥注此以色合皮脈肉筋骨診病之法也凡眉間起五色主病在皮者以肺主皮毛也營變五色蠕蠕然動主病在脈者以營行血脈也眥目起五色主病在筋者以肝主筋也唇口起五色主病在肌者以脾主肉也耳起五色主病在骨者以腎主骨也焦枯垢泥者乃枯骨不澤不能外榮也此下皆診病之雜法也發上屬火須下屬水皮毛屬金眉橫屬木屬土之毫腋陰臍腹髮直如麻毛焦死故注此明毛髮診病之法也發屬心而上長故屬火也須屬腎而下長故屬水也通身之毛屬肺而生皮故屬金也眉屬肝而橫長故屬木也腋下陰下臍中腹中之毫屬脾以應四維故屬土也凡毛髮雖屬五臟然皆血液所生故喜光澤若髮直如麻鬚毛焦枯皆死候也陰絡從經而有常色陽絡無常隨時變色寒多則凝凝則黑青熱多則淖淖則黃紅注此以色合絡脈之診法也絡有陰陽隨陰經之絡為陰絡隨陽經之絡為陽絡也陰絡深而在內陽絡浮而在外在內者不可得而見也惟從經常之色而治之故曰有常色也在外者可得而見則隨四時推遷變色而治之故曰陽絡無常也然陽絡之變色亦不外乎診色之寒熱也寒多則脈凝凝則色青黑也熱多則脈淖淖則色黃紅也胃之大絡名曰虛里動左乳下有過不及其動應衣宗氣外泄促結積聚不至則死注此明宗氣診病法也胃之大絡名曰虛里貫膈絡肺出於左乳之下動不應衣以候宗氣若動之微而不見則為不及主宗氣內虛也若動之應衣而甚則為太過主宗氣外泄若三四至一止或五六至一止則主有積聚也若絶不至者則主死矣脈尺相應尺寒虛瀉尺熱病溫陰虛寒熱風病尺滑痹病尺澀尺大豐盛尺小虧竭注此明診尺之法也尺者謂從關至尺澤之皮膚也經曰脈急尺之皮膚亦急脈緩尺之皮膚亦緩脈小尺之皮膚亦減而少氣脈大尺之皮膚亦賁而起脈滑尺之皮膚亦滑脈澀尺之皮膚亦澀故曰脈尺相應也若診尺之皮膚寒則主虛瀉也診尺之皮膚熱則主病溫也非病溫則主陰虛寒熱勞疾也凡風病則尺之膚滑也痹病則尺之膚澀也氣血盛則尺之肉豐盛氣血虛則尺之肉虧竭也肘候腰腹手股足端尺外肩背尺肉膺前掌中腹中魚青胃寒寒熱所在病生熱寒注此明肘臂之診法也肘上曰膊肘下曰臂膊臂之節曰肘臂內曰尺尺外曰臂肘上候腰腹手主候股足臂主候肩背尺主候胸膺掌中主候腹中手大指本節後名曰魚或有青色或現青脈主候胃中寒也診其寒熱所在何處主病生寒熱也診臍上下上胃下腸腹皮寒熱腸胃相當胃喜冷飲腸喜熱湯熱無灼灼寒無滄滄注此明診臍之法也臍之上主候胃也臍之下主候腸也捫其上下之腹皮寒熱則知胃腸有寒熱相當之病也胃中有病每喜冷飲腸間有病多喜熱湯是其徵也然與之飲熱不可過於灼灼之熱與寒不可過於滄滄之寒蓋恐其恣意有失惟當適其寒溫之宜也胃熱口糜懸心善飢腸熱利熱出黃如糜胃寒清厥腹脹而疼腸寒尿白饗瀉腸鳴注此明胃腸寒熱為病之診法也胃中有熱則上發口糜心空善飢腸中有熱則瀉出之物亦熱色黃如粥胃中有寒面清冷厥則腹脹而疼腸中有寒則小便尿白饗瀉腸鳴也木形之人其色必蒼身直五小五瘦五長多才勞心多憂勞事軟弱曲短一有非良注此下五條皆以色合形之診法也木形之人其色合青貴乎如碧蒼之潤也身直者象木之干直也五小者謂頭小手足小象木之巔枝也五瘦五長者謂身肢象木之條細而長也多才者象木之用隨斫成材也多才之人必勞於心也多憂者象木之性不能自靜也多憂之人必勞於事也若一有形質軟弱曲短皆非良材也火形赤明小面五鋭反露偏陋神清主貴重氣輕財少信多慮好動心急最忌不配注火形之人其色合赤貴乎明也五鋭者謂頭額鼻面口象火上之尖鋭也五反五露者謂五官反外露外也象火之性張顯外露也五偏五陋者謂五官不正醜陋也象火寄體隨物難定也凡此反露偏陋皆火敗形若神清而明是為得火之神則反主貴也重氣者象火屬陽多氣也輕財者象火之性多散也少信者象火之性易變也多慮者象火之明燭物也好動者象火之用不靜也心急者象火之性急速也最忌神癡氣濁色悖則為不配皆敗形也土形之狀黃亮五圓五實五厚五短貴全面圓頭大厚腹股肩容人有信行緩心安注土形之人其色合黃貴乎亮也五圓者象土之形圓也五實五厚者象土之質實厚也五短者象土之形敦短也圓實厚短五者俱全各成一形皆為土之正形則主貴也面圓頭大厚腹美肩美股皆土厚實之狀也客人有信行緩心安皆土德性之厚也金形潔白五正五方五朝五潤偏削敗亡居處靜悍行廉性剛為吏威肅兼小無傷注金形之人其色合白貴乎潔也五正五方者象金之形方正也五朝者金主骨骨胳貴內朝明堂也五潤者象金之藏於水也偏則不方正削則骨露陷敗亡之形也居處靜悍者象金靜而悍也行廉性剛者象金性潔而剛也為吏威肅者象金之性肅殺也兼小無傷者謂方正朝潤雖小無傷金之正形也水形紫潤麵肥不平五肥五嫩五秀五清流動搖身常不敬畏內欺外恭粗濁主廢注水形之人其色合紫貴乎潤色麵肥不平者象水之面廣而有波也五肥者象水之形廣大也五嫩者象水之性滋潤也五秀五清者象水之質清徹也肥嫩之質發行常流動搖身象水之流動不居也常不敬畏者象水之性趨下不上也內欺外恭者象水之質內虛無實也若神氣粗濁皆主廢形也貴乎相得最忌相勝形勝色微色勝形重至勝時年加感則病年忌七九猶宜慎恐注此明得其形不得其色之診法也假如木形之人法當色青是為形色相得不病而貴之形也若見黃色或見白色是為相勝主病而最忌者也見黃色者則為形勝色主病微見白色者則為色勝形主病重也然其生病必至於勝木之時之年加感外邪則病也年忌者謂五形之人形色相勝者凡至七歲是為年忌積九遞加至十六歲二十五歲三十四歲四十三歲五十二歲六十一歲皆年忌之年也當此之年加感為病則甚故曰尤宜戒慎恐懼也形有強弱肉有脆堅強者難犯弱者易干肥食少痰最怕如綿瘦食多火著骨難全注此明形肉生死之診法也五形之人得其純者皆謂之強得其駁者皆謂之弱強者加感之邪難犯弱者加感之邪易干也能食形肥者強也若食少而肥者非強也乃痰也肥人最怕按之如綿絮謂之無氣則主死矣食少而瘦者弱也若食多而瘦者非弱也乃火也瘦人最怕肉乾著骨謂之消瘦亦主死矣形氣已脫脈調猶死形氣不足脈調可醫形盛脈小少氣體治形衰脈大多氣死期注此以形合脈診生死之法也經曰形氣已脫九候雖調猶死者謂形脫無以貯氣也形氣俱虛寸口脈調可醫者謂形氣未相失也形盛而肥脈小少氣者謂氣不能勝形也形衰而瘦脈大多氣者謂形不能勝氣也故皆主死也頸痛喘疾目裹腫水面腫風水足腫石水手腫至腕足腫至踝面腫至項陽虛可嗟注此明形腫生死之診法也視其病者人迎頸脈大動主喘不得臥之疾也目裹上下腫者主有水氣之病也從面腫起者名曰風水陽水也從足脛腫起者名曰石水陰水也若手腫至腕足腫至踝面腫至項非水也乃陽氣虛結不還之死證也頭傾視深背曲肩隨坐則腰痿轉搖遲回行則僂俯立則振掉形神將奪筋骨虺頽注此明形憊死候之診法也經曰夫五臟者身之強也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖艱難腎將憊矣膝者筋之府屈伸不能行則僂俯筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣凡此形神將奪筋骨虺頽之形狀故皆主死候也太陰情狀貪而不仁好入惡出下意貌親不隨時務後動於人長大似僂其色黮黮注此明陰陽之人之情狀以別陰陽盛衰法也太陰陰盛而過柔故貪而不仁也好入惡出陰性藏也下意貌親陰性卑柔也不隨時務陰喜靜也後動於人陰性遲也長大者陰盛之形也似僂者好曲身傴僂下意之態也其色黑黮黮陰盛之色也此太陰人之情狀也少陰情狀小貪賊心喜失慍得傷害無恩立則險躁寡和無親行如伏鼠易懼易欣注少陰陰微而殘忍故貪小而賊心也喜失慍得陰性嫉妒也傷害無恩陰性殘忍也立則險躁陰性危險也寡和無親陰性冷落也行如伏鼠陰性隱伏也易懼易欣謂如鼠之得失欣然而進懼然而退也此少陰人之情狀也太陽情狀自大軒昂仰胸挺腹足高氣揚志大虛說作事好強雖敗無悔自用如常注太陽陽盛而過剛故自大軒昂仰胸挺腹足高氣揚也好志大者陽性好剛強也好虛說者陽性好誇張也作事好強雖事敗而不悔者以其常好自用自是亦陽過剛果於斷也此太陽人之情狀也少陽情狀諟諦自貴志小易盈好外不內立則好仰行則好搖兩臂兩肘常出於背注少陽陽微而明小故諟諦小察自貴小官志小易盈滿也好外交而不內附者陽之性外也立則好仰陽之性上也行則好搖陽之性動也兩臂兩肘常出於背者亦陽之性喜露而不喜藏也此少陽人之情狀也得陰陽正平和之人無為懼懼無為欣欣婉然從物肅然自新謙謙君子藹藹吉人注此明陰陽和平人之情狀也無為懼懼者中心有所主而威武不能屈也無為欣欣者外物不能惑而富貴不能淫也婉然從物者謂豁然而大公物來而順應也肅然自新者謂尊嚴以方外恭敬以直內也夫如是之人天必祐之人必愛之福祿綏之焉得不謂之謙謙君子藹藹吉人也哉明此五者其人之陰陽盛衰自可見矣四診心法要訣下四言脈訣始自漢張仲景平脈法宋崔嘉彥衍之明李時珍刪補及李中梓又補其缺略刪其差謬復加注釋固已文簡義該矣然猶有與經義不合者今皆刪去其未備者補之脈為血府百體貫通寸口動脈大會朝宗注經曰脈者血之府也周身血脈運行莫不由此貫通故曰百體貫通也難經曰十二經中皆有動脈獨取寸口以決死生寸口者左右寸關尺手太陰肺經動脈也為脈之大要會也故曰寸口動脈大會朝宗也診人之脈高骨上取因何名關界乎寸尺注凡診人之脈令仰其手視掌後有高骨隆起即是關部脈也醫者覆手取之先將中指取定關部方下前後二指於寸尺之上病人長則下指宜疏病人短則下指宜密因其界乎寸尺二部之間故命名曰關至魚一寸至澤一尺因此命名陽寸陰尺注從高骨上至魚際長一寸因此命名曰寸從高骨下至尺澤長一尺因此命名曰尺寸部候上故為陽也尺部候下故為陰也右寸肺胸左寸心膻右關脾胃左肝膈膽三部三焦兩尺兩腎左小膀胱右大腸認注右寸浮候胸中沉以候肺左寸浮候膻中沉以候心右關浮以候胃沉以候脾左關浮候膈膽沉以候肝兩尺沉俱候腎左尺浮候小腸膀胱右尺浮候大腸膻膻中即包絡也五臟皆一惟腎有二故曰兩尺候兩腎也然內經言腑不及膽者以寄於肝也不及大小腸膀胱者以統於腹中也不及三焦者以寸候胸中主上焦也關候膈中主中焦也尺候腹中主下焦也此遵內經分配三部診脈法也至僞訣以大小腸配於寸上以三焦配於左尺以命門配於右尺其手厥陰包絡竟置而不言悉屬不經滑壽以左尺候小腸膀胱前陰之病右尺候大腸後陰之病可稱千古隻眼也浮外候腑沉內候臟之說詳於卷末命門屬腎生氣之原人無兩尺必死不痊注兩腎之中名曰命門命門居兩腎之中故兩尺屬之命門之少火即腎間動氣是為生氣之原也人若無兩尺脈則生氣絶矣病者必死不能痊也關脈一分右食左風右為氣口左為人迎注陰得尺中一寸陽得寸內九分一寸九分寸關尺脈三分分之今日關脈一分乃關上之一分也左關一分名人迎肝膽脈也肝膽主風故人迎緊盛主乎傷風右關一分名氣口脾胃脈也脾胃主食故氣口緊盛主乎傷食此創自叔和試之於診每多不應然為後世所宗不得不姑存其說觀內經以足陽明胃經頸上之動脈為人迎手太陰肺經高骨之動脈為氣口足知其謬矣脈有七診曰浮中沉上竟下竟左右推尋注浮者輕下指於皮脈間所得之脈也沉者重下指於筋骨間所得之脈也中者不輕不重下指於肌肉間所得之脈也上者兩寸也竟者即內經上竟上者胸喉中事也下者兩尺也竟者即內經下竟下者少腹腰股脛足中事也左右者左右手脈也此七診者乃推尋取脈之法也非謂內經獨大獨小獨寒獨熱獨遲獨疾獨陷下七診之脈也男左大順女右大宜男尺恆虛女尺恆實注天道陽盛於左地道陰盛於右故男左女右脈大為順宜也天之陽在南陰在北地之陽在北陰在南陽道常饒陰道常虧故男寸恆實尺恆虛女寸恆虛尺恆實也又有三部曰天地人部各有三九候名焉額頰耳前寸口歧鋭下足三陰肝腎脾胃注此遵內經三部九候十二經中皆有動脈之診法也三部謂上中下也曰天地人謂上中下三部有天地人之名也部各有三九候名焉謂三部各有天地人三而三之合為九候之名也額頰耳前謂兩額兩頰耳前也上部天兩額之動脈當頷厭之分足少陽脈氣所行以候頭角者也上部地兩頰之動脈即地倉人迎之分足陽明脈氣所行以候口齒者也上部人耳前之動脈即和髎之分手少陽脈氣所行以候耳目者也寸口歧鋭謂寸口歧骨鋭骨也中部天乃掌後經渠之次寸口之動脈手太陰脈氣所行以候肺者也中部地乃手大指次指歧骨間合谷之動脈手陽明脈氣所行以候胸中者也中部人乃掌後鋭骨下神門之動脈手少陰脈氣所行以候心者也下足三陰謂五里太溪箕門肝腎脾胃也下部天乃氣衝下三寸五里之動脈足厥陰脈氣所行以候肝者也下部地乃內踝後跟骨傍太溪之動脈足少陰脈氣所行以候腎者也下部人乃魚腹上越筋間箕門之動脈足太陰脈氣所行以候脾胃者也寸口大會五十合經不滿其動無氣必凶更加疏數止還不能短死歲內期定難生注寸口動脈五十一止合於經常不病之脈也若四十動一止一臟無氣主四歲死三十動一止二臟無氣主三歲死二十動一止三臟無氣主二歲死十動一止四臟無氣主一歲死不滿十動一止五臟無氣若更乍數乍疏止而不能即還則可期短死一歲之內必難生也五臟本脈各有所管心浮大散肺浮澀短肝沉弦長腎沉滑軟從容而和脾中遲緩注此言五臟各有所管之本脈必皆不大不小從容而和始為五臟不病之脈也四時平脈緩而和勻春弦夏洪秋毛冬沉注此言四時各有應見之平脈必皆不疾不徐緩而和勻始為四時不病之脈也太過實強病生於外不及虛微病生於內注外因六氣風寒暑濕燥火之邪脈必洪大緊數弦長滑實而太過矣內因七情喜怒憂思悲恐驚之傷脈必虛微細弱短澀濡芤而不及矣飲食勞倦診在右關有力為實無力虛看注凡病外不因六氣內不因七情為不內外因內傷飲食勞倦也飲食傷胃勞倦傷脾故診在右關飲食傷形為有餘故右關脈有力勞倦傷氣為不足故右關脈無力也三因百病之脈不論陰陽浮沉遲數滑澀大小凡有力皆為實無力皆為虛經曰諸陽脈按之不鼓諸陰脈按之鼓甚此之謂歟凡診病脈平旦為準虛靜寧神調息細審注經曰常以平旦陰氣未動陽氣未散飲食未進經脈未盛絡脈調勻氣血未亂乃可診有過之脈又曰診脈有道虛靜為寶言無思無慮以虛靜其心惟神凝於指下也調息細審者言醫家調勻自己氣息精細審察也一呼一吸合為一息脈來四至平和之則五至無疴閏以太息三至為遲遲則為冷六至為數數則熱證轉遲轉冷轉數轉熱注醫者調勻氣息一呼脈再至一吸脈再至呼吸定息脈來四至乃和平之準則也然何以五至無疴乎人之氣息時長時短凡鼓三息必有一息之長鼓五息又有一息之長名為太息如三歲一閏五歲再閏也言脈必以四至為平五至便為太過惟正當太息之時始曰無疴此息之長非脈之急也若非太息正合四至也至於性急之人五至為平脈不拘太息之例蓋性急脈亦急也若一息而脈三至即為遲慢而不及矣遲主冷病若一息而脈遂六至即為急數而太過矣數主熱病若一息僅得二至甚而一至則轉遲而轉冷矣若一息七至甚而八至九至則轉數而轉熱矣一至二至八至九至皆死脈也遲數既明浮沉須別浮沉遲數辨內外因外因於天內因於人天有陰陽風雨晦明人喜憂怒思悲恐驚注浮脈法天候表之疾即外因也沉脈法地候里之病即內因也外因者天之六氣風風淫末疾寒寒淫陰疾暑暑淫心疾濕濕淫腹疾燥燥淫涸疾火火淫陽疾是也內因者人之七情喜傷心怒傷肝憂思傷脾悲傷肺恐傷腎驚傷心也浮沉已辨滑澀當明澀為血滯滑為氣壅注此上六脈為諸脈之提綱以浮沉統諸浮上沉下之部位也以遲數統諸三至六至之至數也以滑澀統諸滑流澀滯之形狀也脈象雖多然不屬部位則屬至數不屬至數則屬形狀總不外此六脈故為諸脈之提綱也浮脈皮脈沉脈筋骨肌肉候中部位統屬注皮脈取之而得者謂之浮脈筋骨取之而得者謂之沉脈此以上下部位而得名也凡脈因部位而得名者皆統乎浮沉故曰部位統屬也心肺俱浮以皮毛取之而得者肺之浮也以血脈取之而得者心之浮也故曰浮脈皮脈肝腎俱沉以筋平取之而得者肝之沉也以至骨取之而得者腎之沉也故曰沉脈筋骨肌肉在浮沉之間故曰候中也浮無力濡沉無力弱沉極力牢浮極力革注浮而無力謂之濡脈沉而無力謂之弱脈浮而極有力謂之革脈沉而極有力謂之牢脈三部有力其名曰實三部無力其名曰虛注浮中沉三部俱有力謂之實脈浮中沉三部俱無力謂之虛脈三部無力按之且小似有似無微脈可考注浮中沉三部極無力按之且小似有似無謂之微脈三部無力按之且大渙漫不收散脈可察注浮中沉三部極無力按之且大渙漫不收謂之散脈惟中無力其名曰芤推筋著骨伏脈可求注浮沉有力中取無力謂之芤脈推筋著骨按之始得謂之伏脈以上十脈皆以部位而得名者故皆統於浮沉也三至為遲六至為數注一呼一吸謂之一息一息三至謂之遲脈一息六至謂之數脈此以脈之至數而得名也凡脈因至數而得名者皆統乎遲數也四至為緩七至疾脈注一息四至謂之緩脈一息七至謂之疾脈緩止曰結數止曰促凡此之診皆統至數動而中止不能自還至數不乖代則難痊注四至緩脈時而一止謂之結脈六至數脈時而一止謂之促脈結促之脈動而中止即能自還若動而中止不能自還須臾復動或十至或二三十至一止其至數不乖謂之代脈難痊謂不滿五十動而止合經難痊之死脈也以上五脈皆以至數而得名者故皆統於遲數也形狀如珠滑溜不定往來澀滯澀脈可證注形狀如珠滑溜不定謂之滑脈進退維艱往來滯澀謂之澀脈此以脈之形狀而得名也凡脈以形狀而得名者皆統乎滑澀也弦細端直且徑曰弦緊比弦粗徑左右彈注狀類弓弦細而端直按之且徑謂之弦脈較弦則粗按之且徑左右彈指謂之緊脈來盛去衰洪脈名顯大則寬闊小則細減注上來應指而盛下去減力而衰謂之洪脈脈形粗大闊然謂之大脈脈形細減如絲謂之小脈即細脈也如豆亂動不移約約長則迢迢短則縮縮注其形如豆亂動約約動搖不移謂之動脈來去迢迢而長謂之長脈來去縮縮而短謂之短脈以上八脈皆以形狀而得名者故皆統於滑澀也浮陽主表風淫六氣有力表實無力表虛浮遲表冷浮緩風濕浮濡傷暑浮散虛極浮洪陽盛浮大陽實浮細氣少浮澀血虛浮數風熱浮緊風寒浮弦風飲浮滑風痰注浮陽脈主表風邪六氣外因之病皆從表入故屬之也浮而有力表實風病也浮而無力表虛風病也遲寒脈也故曰表冷緩濕脈也故曰風濕濡氣虛脈也氣虛則傷暑故曰浮濡傷暑也散氣散脈也氣散則虛極故曰浮散虛極也浮洪陽盛脈故曰陽盛也浮大陽實脈故曰陽實也細氣少脈氣少不充故曰氣少也澀血少脈血少枯滯故曰血虛也數熱脈也故曰風熱緊寒脈也故曰風寒弦飲脈也故曰風飲滑痰脈也故曰風痰沉陰主裡七情氣食沉大里實沉小裡虛沉遲里冷沉緩里濕沉緊冷痛沉數熱極沉澀痹氣沉滑痰食沉伏閉郁沉弦飲疾注沉陰脈主裡七情氣食內因之病皆由里生故屬之也大有餘脈也故曰裡實小不足脈也故曰裡虛遲寒脈也故曰里冷緩濕脈也故曰里濕緊寒脈也故曰冷痛數熱脈也故曰熱極澀血滯脈故曰痹氣滑痰食脈故曰痰食伏痛甚不得吐瀉脈也故曰閉郁弦飲脈也故曰飲疾濡陽虛病弱陰虛疾微主諸虛散為虛劇注濡為陽分無力脈故主諸陽虛之病弱為陰分無力脈故主諸陰虛之病微為陰陽血氣不足脈故主諸虛散為元氣散之脈故曰虛劇也革傷精血半産帶崩牢疝癥瘕心腹寒疼注革內空之脈故主男子亡血傷精之病婦人半産崩帶之疾牢內堅之脈故主諸疝癥瘕心腹寒冷疼痛之病也虛主諸虛實主諸實芤主失血隨見可知注虛為三部無力脈故主諸虛實為三部有力脈故主諸實芤為營空之脈故主失血然此三脈皆隨所見之部位可知其上下內外之病也遲寒主臟陰冷相干有力寒痛無力虛寒注遲陰脈也臟屬陰故主之凡陰冷之病皆屬之也有力為寒實作痛無力為寒虛痛也數熱主腑數細陰傷有力實熱無力虛瘡注數陽脈也腑屬陽故主之凡陽屬之病皆屬之也數為陽盛細為不足故曰傷陰有力為實熱無力為虛熱數亦主瘡故曰虛瘡緩濕脾胃堅大濕壅促為陽郁結則陰凝注緩脾胃脈又主濕邪故緩主濕邪脾胃之病若搏指堅大則為濕邪壅脹之病促為陽盛而鬱之脈結為陰盛而凝之脈也代則氣乏跌打悶絶奪氣痛瘡女胎三月注代者真氣乏而求代之脈也若不因跌打氣悶暴病奪氣痛瘡傷氣女胎氣阻者而無故見之則必死也滑司痰病關主食風寸候吐逆尺便血膿注滑陽脈陽盛為痰故司痰病右關候胃故主痰食左關候肝故主風痰寸候上焦故主吐逆尺候下焦故主便血膿也澀虛濕痹尺精血傷寸汗津竭關膈液亡注澀血少滯澀脈也六脈見之則主營虛受濕痹之病若兩尺見之則主傷精傷血之病兩寸見之則主汗多津傷之病兩關見之則主噎膈反胃液亡結腸之病也弦關主飲木侮脾經寸弦頭痛尺弦腹疼注弦陰脈陰盛為飲弦木脈木旺侮土土虛不能制濕故飲病生焉寸弦陰乘陽也故主頭痛尺弦陰乘陰也故主腹疼緊主寒痛洪是火傷動主痛熱崩汗驚狂注緊寒實脈故主寒痛洪熱實脈故主火傷動為陰陽相搏之陽脈故主諸痛陽動主發熱主驚狂陰動主汗出血崩也長則氣治短則氣病細則氣衰大則病進注長者氣之暢也故曰氣治短者氣之縮也故曰氣病小者正氣衰也大者邪病進也脈之主病有宜不宜陰陽順逆吉凶可推注病有陰陽脈亦有陰陽順應則吉逆見則凶此以下至其死可測句凡二十七節詳分某病見某脈吉某病見某脈凶也中風之脈卻喜浮遲堅大急疾其凶可知注中風虛見虛脈以浮遲為順若反見堅大急疾為逆決無生理傷寒熱病脈喜浮洪沉微澀小證反必凶汗後脈靜身涼則安汗後脈躁熱甚必難陽證見陰命必危殆陰證見陽雖困無害注此節皆言傷寒之順逆也傷寒熱病傳裡屬熱脈以浮洪陽脈為吉若見沉微澀小陰脈是證與脈反故凶汗後邪解便當脈靜身涼若躁而熱所謂汗後不為汗衰名曰陰陽交必難治矣陽證而見沉澀細微弱遲之陰脈則脈與證反命必危殆陰證而見浮大數動洪滑之陽脈雖脈與證反在他證忌之獨傷寒為陰邪還陽將解之診病雖危困無害於命也勞倦傷脾脈當虛弱自汗脈躁死不可卻注勞倦傷脾脈當虛弱為順也若自汗出而脈反躁疾則逆矣安得不死瘧脈自弦弦遲多寒弦數多熱代散則難注瘧為寒熱之病弦為少陽之脈少陽主病寒熱往來凡寒熱之病多屬少陽半表半裡之界故瘧脈自應得弦象也遲多寒數多熱理自然也若得代散二脈邪尚未解正氣已衰命則難生矣泄瀉下利沉小滑弱實大浮數發熱則惡注瀉痢裡虛宜見沉小滑弱之脈為順若反見實大浮數之脈則身必發熱而成惡候也嘔吐反胃浮滑者昌沉數細澀結腸者亡注嘔吐反胃脾虛有痰也浮為虛滑為痰是為順脈故曰昌也若沉數細澀則為氣少液枯遂致結腸糞如羊屎死不可救矣霍亂之候脈代勿訝舌卷囊縮厥伏可嗟注霍亂之診陽脈為佳若見代脈因一時清濁混亂故脈不接續非死候也如脈伏不見四肢厥逆舌卷囊縮為陰寒甚則有可嗟之變也嗽脈多浮浮濡易治沉伏而緊死期將至注嗽乃肺疾脈浮為宜兼見濡者病將退也若沉伏與緊則相反而病深矣不死何待喘息抬肩浮滑是順沉澀肢寒切為逆證注陽喘多實風與痰耳故脈以浮滑為順陰喘多虛寒與虛也故脈沉澀四肢寒者均為不治逆證火熱之證洪數為宜微弱無神根本脫離注熱證而得洪數乃正應也若見微弱證脈相反根本脫離藥餌不可施矣骨蒸發熱脈數而虛熱而澀小必殞其軀注骨蒸者腎水不足壯火僭上虛數二脈是正象也若澀小之脈所謂發熱脈靜不可救耳勞極諸虛浮軟微弱土敗雙弦火炎細數注虛證宜見虛脈若兩關脈弦謂之雙弦弦乃肝脈右關見之是肝木乘脾故曰土敗勞證之脈若見細數乃陰虛火盛上刑肺金便不可治失血諸證脈必見芤緩小可喜數大堪憂注蓀有中空之象失血者宜爾也緩小亦為虛脈順而可喜若數且大謂之邪勝故可憂也蓄血在中牢大卻宜沉澀而微速愈者稀注蓄血者有形之實證見牢大之脈脈證相宜倘沉澀而微是挾虛矣既不能自行其血又難施峻猛之劑安望速愈也三消之脈數大者生細微短澀應手堪驚注渴而多飲為上消消穀善飢為中消渴而便數為下消三消者皆燥熱太過惟見數大之脈為吉耳細微短澀死不可救也小便淋閉鼻色必黃實大可療澀小知亡注鼻頭色黃必患小便難六脈實大者但用攻病之劑必愈若逢澀小為精氣不化死亡將及矣癲乃重陰狂乃重陽浮洪吉象沉急凶殃注癲狂二證皆以浮洪為吉取其病尚淺也若沉而急病已入骨雖有扁倉莫之能救矣癇宜浮緩沉小急實但弦無胃必死不失注癇本風痰脈見浮緩自應然也若沉小急實是病深也或但弦無胃則肝之真臟脈見矣安望其更生耶心腹之痛其類有九細遲速愈浮大延久注九種心腹之痛皆宜遲細易於施療如浮而大是為中虛邪盛不能收捷功也疝屬肝病脈必弦急牢急者生弱急者死注肝主筋疝則筋急故屬肝也肝脈弦急是其常也疝系陰寒之咎牢主裡寒之脈亦其常也如且弱且急必有性命之憂矣黃疸濕熱洪數便宜不妨浮大微澀難醫注濕蒸熱瘀黃疸生焉洪數浮大皆所宜也一見微澀虛衰已甚必食少瀉多無藥可療矣腫脹之脈浮大洪實細而沉微岐黃無術注水腫脹滿有餘之證宜見有餘之脈浮大洪實是矣沉細而微謂之證實脈虛難言生矣五臟為積六腑為聚實強可生沉細難愈注積聚皆實證也實脈強盛是所當然沉細為虛真氣敗絶不可為矣中惡腹脹緊細乃生浮大為何邪氣已深注中惡者不正之氣也緊細則吉浮大則凶也鬼崇之脈左右不齊乍大乍小乍數乍遲注鬼崇犯人左右二手脈象不一忽大忽小忽數忽遲無一定之脈形也癰疽未潰洪大脈宜及其已潰洪大最忌注未潰屬實洪大為正脈也潰後則虛若仍見洪大則為邪脈最所忌也肺癰已成寸數而實肺痿之證數而無力癰痿色白脈宜短澀數大相逢氣損血失腸癰實熱滑數相宜沉細無根其死可期注肺癰而寸口數實知膿已成矣肺葉焦痿為火傷也是以數而無力肺癰肺瘦得白色者肺之本色得短澀者肺之本脈均相宜也若逢數大是火來剋金賊邪之診故氣損血失也腸癰實也滑數相宜沉細虛也證實脈虛死期將至矣婦人有子陰搏陽別少陰動甚其胎已結滑疾而散胎必三月按之不散五月可別左男右女孕乳是主女腹如箕男腹如釜注此一節明女科胎前之脈也陰搏陽別者寸為陽尺為陰言尺陰之脈搏指而動寸陽之脈則不搏指迥然分別此有子之診也或手少陰心脈獨動而甚者蓋心主血血主胎故胎結而動甚也動者謂往來流利之動而滑非厥厥搖動為病之動也疾即數也滑而且數按之而散三月之胎也按之不散五月之胎也左為陽故左疾為男胎右為陰故右疾為女胎五六月後孕婦之乳房有核吮之有乳者則主有子也女胎腹形狀如箕之圓也男胎腹形狀如釜之上小而下大也欲産離經新産小緩實弦牢大其凶不免注此一節明産中之脈也欲産脈離經者謂見離乎經常之脈也蓋胎動於中脈亂於外勢所必然也産後氣血兩虛見小緩之虛脈為吉若見實大弦牢其凶不免矣經脈病脈業已昭詳將絶之形更當度量注經常之脈主病之脈皆明於前矣而死絶之脈亦不可不察也分列於後心絶之脈如摻帶鉤轉豆躁疾一日可憂注經曰脈來前曲後居如摻帶鉤曰心絶前曲者謂輕取則堅強而不柔後居者謂重取則牢實而不動如持革帶之鉤全失沖和之氣但鉤無胃故曰心死鉤即洪脈也轉豆者即經所謂如循薏苡子纍纍然狀其短實堅強真臟脈也又曰心絶一日死肝絶之脈循刃責責新張弓弦死在八日注經曰真肝脈至中外爭如循刃又曰脈來急溢徑如新張弓弦曰肝死又曰肝絶八日死脾絶雀啄又同屋漏覆杯水流四日無救注舊訣曰雀啄連來四五啄屋漏少刻一點落若杯覆若水流皆脾絶也經曰脾絶四日死肺絶維何如風吹毛毛羽中膚三日而號注經曰如風吹毛曰肺死又曰真肺脈至如以毛羽中人膚皆狀其但浮而無胃氣也又曰肺絶三日死腎絶伊何發如奪索辟辟彈石四日而作注經曰脈來如奪索辟辟如彈石曰腎死又曰腎絶四日死舊訣云彈石硬來尋即散搭指散亂如解索正此謂也石即沉脈也命脈將絶魚翔蝦游至如湧泉莫可挽留注舊訣云魚翔似有又似無蝦游靜中忽一躍經曰渾渾革至如湧泉綿綿其去如弦絶皆死脈也脈有反關動在臂後別由列缺不幹證候注反關脈者脈不行於寸口出列缺絡入臂後手陽明大腸之經也以其不順行於關上故曰反關有一手反關者有兩手反關者此得於有生之初非病脈也令病人側立其手診之方可見也歧黃脈法候病死生太素脈法陰陽貴清清如潤玉至數分明濁脈如石模糊不清小大貧富澀滑窮通長短壽夭詳推錯綜注脈法倡自歧黃所以候病死生至楊上善為風鑑者流託名太素脈法以神其說每多不驗然其中有近理可採者如論六陽六陰之脈以清主貴以濁主賤清脈之狀似玉潤淨至數分明濁脈之狀如石粗澀至數模糊小脈主貧大脈主富澀脈主窮滑脈主通長脈主壽短脈主夭如質清脈濁貴中賤也質濁脈清賤中貴也清脈兼大貴而富也兼滑貴而通也兼長貴而壽也濁脈兼小賤而貧也兼澀賤而窮也兼短賤而夭也清脈兼小貴而貧也兼澀貴而窮也兼短貴而夭也濁脈兼大賤而富也兼滑賤而通也兼長賤而壽也詳推錯綜者即詳推此質清脈清質濁脈濁質清脈濁質濁脈清錯綜等說之理耳附訂正素問脈要精微論一則備考尺內兩傍則季脅也尺外以候腎尺裡以候腹中中附上左外以候肝內以候膈右外以候胃內以候脾上附上右外以候肺內以候胸中左外以候心內以候膻中前以候前後以候後上竟上者胸喉中事也下竟下者少腹腰股膝脛足中事也注內外二字前人有以尺部一脈前半部脈後半部脈為訓者有以內側曰內外側曰外為訓者皆非也蓋脈之形渾然純一並不兩條亦不兩截若以前半部後半部為是則視脈為兩截矣若以尺內側尺外側為是則視脈為兩條矣故知二說皆非也熟玩通章經文自知其為傳寫之訛豈有獨於脾胃則曰右外以候胃內以候脾者耶蓋外以候腑內以候臟內經脈書確然可考故當以外以候胃內以候脾之句為正其尺外之外字當是里字尺裡之里字當是外字中附上左右之內外字上附上左右之內外字皆當改之故不循舊圖所列以符外候腑內候臟之義也前以候前謂關之前寸也後以候後謂關之後尺也上竟上者謂上盡魚際也下竟下者謂下盡尺澤也
